<!DOCTYPE html>
<html>

<head>
    <title>Minesweeper Online Helper</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css">
    <script src="uiShared.js"></script>
    <script src="contentScripts.js"></script>
    <script src="popupState.js"></script>
    <script src="gems.js"></script>
    <script src="tickets.js"></script>
    <script src="equipment.js"></script>
    <script src="data.js"></script>
    <script src="eventQuest.js"></script>
    <script src="statistic.js"></script>
    <script src="eventArena0.js"></script>
    <script src="friendQuest0.js"></script>
    <script src="capture.js"></script>
    <script src="economy.js"></script>
    <script src="contact0.js"></script>
    <script src="cheapEquipment.js"></script>
    <script src="monitor.js"></script>
    <script src="countBV.js"></script>
    <script src="distributionBV.js"></script>
    <script src="monitorChat.js"></script>
    <script src="wheel.js"></script>
    <script src="bvsLine.js"></script>
    <script src="removeSkin.js"></script>
</head>
<body id="mainBody" class="popupBody">
    <header class="popupHeader">
        <h1>WoM Helper</h1>
    </header>

    <main class="popupMain">
        <section class="popupCard">
            <h2>全局动作</h2>
            <div class="buttonStack">
                <button id="button0">打开主界面</button>
                <button id="button1">刷新宝石/场币/碎片价格</button>
                <button id="button2">刷新竞技场门票价格</button>
                <button id="buttonEquip">刷新装备加成</button>
                <button id="button5">刷新游戏数据</button>
                <button id="button3">刷新个人数据</button>
                <button id="buttonEco">刷新财产估值</button>
                <button id="buttonAddFriend">添加好友</button>
                <button id="buttonDistributionBV">统计我的游戏</button>
                <button id="buttonDistributionBV500">统计我的游戏（500页）</button>
                <button id="buttonBvsLine">观测3BV/s</button>
                <button id="buttonCountBV">观测效率</button>
                <button id="buttonRemoveSkin">移除特殊皮肤</button>
            </div>
        </section>

        <section class="popupCard" id="advMode" style="display: none;">
            <h2>高级工具</h2>
            <div class="buttonStack">
                <button id="buttonCheapEquip">查找低价装备</button>
                <table id="equipCheap" style="display: none;"></table>
                <span id="noEquipCheap" style="display:none">未找到适合拆碎片的装备</span>
                <button id="buttonMonitor">监测价格</button>
                <div id="monitorSet" style="display:none" class="monitorSet">
                    <div id="flagMonitor" style="display:none;">0</div>
                    <div class="inlineInput">
                        <span>价格达到</span><input id="priceThreshold"><span>时提醒</span>
                    </div>
                    <span id="monitorNotice" style="display:none">请输入价格阈值！</span>
                    <button id="buttonStopMonitor">停止监测</button>
                </div>
                <button id="buttonSave">保存当前版面</button>
                <button id="buttonMonitorChat">监控聊天</button>
                <span id="countBVResult" style="display:none"></span>
            </div>
        </section>

        <section class="popupCard eventCard" id="event1">
            <h2>活动竞技场</h2>
            <button id="buttonEa">刷新活动门票价格</button>
        </section>

        <section class="popupCard eventCard" id="event2">
            <h2>友谊任务</h2>
            <div class="buttonStack">
                <button id="buttonFq">刷新友谊任务</button>
                <button id="buttonFqAll">刷新全部友谊任务</button>
            </div>
        </section>

        <section class="popupCard eventCard" id="event3">
            <h2>命运转盘</h2>
            <button id="buttonWh">分析转盘选项</button>
            <div id="resultWh" class="resultBlock"></div>
        </section>

        <section class="popupCard eventCard" id="event4">
            <h2>全球任务</h2>
            <div class="buttonStack">
                <button id="buttonEq">分析活动任务</button>
                <button id="buttonEqTally">统计奖牌榜</button>
            </div>
            <div id="result" class="resultBlock"></div>
        </section>
    </main>
    <div id="popupToastHost" class="popupToastHost" aria-live="polite" aria-atomic="true"></div>
</body>

</html>
